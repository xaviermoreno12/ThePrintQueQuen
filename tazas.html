<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Tazas - The Print</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header style="padding: 2rem; background: var(--gradient-1); text-align: center;">
        <a href="index.html" style="color: var(--cyan); text-decoration: none; font-size: 1.2rem; display: inline-block; margin-bottom: 1rem;"><i class="fas fa-arrow-left"></i> Volver a The Print</a>
        <h1 style="color: var(--white);"><i class="fas fa-mug-hot"></i> Galería: Tazas</h1>
    </header>

    <!-- Gallery Section -->
    <section class="gallery" id="gallery" style="min-height: 80vh;">
        <div class="container">
            <div class="gallery-grid">
                <!-- CAMBIAR: Reemplazar con imagenes reales -->
                <div class="gallery-item" data-aos="flip-left">
                    <div class="placeholder-image">
                        <i class="fas fa-image"></i>
                        <p>Trabajo 1</p>
                    </div>
                </div>
                <div class="gallery-item" data-aos="flip-left" data-aos-delay="100">
                    <div class="placeholder-image">
                        <i class="fas fa-image"></i>
                        <p>Trabajo 2</p>
                    </div>
                </div>
                <div class="gallery-item" data-aos="flip-left" data-aos-delay="200">
                    <div class="placeholder-image">
                        <i class="fas fa-image"></i>
                        <p>Trabajo 3</p>
                    </div>
                </div>
                <div class="gallery-item" data-aos="flip-left" data-aos-delay="300">
                    <div class="placeholder-image">
                        <i class="fas fa-image"></i>
                        <p>Trabajo 4</p>
                    </div>
                </div>
                <div class="gallery-item" data-aos="flip-left" data-aos-delay="400">
                    <div class="placeholder-image">
                        <i class="fas fa-image"></i>
                        <p>Trabajo 5</p>
                    </div>
                </div>
                <div class="gallery-item" data-aos="flip-left" data-aos-delay="500">
                    <div class="placeholder-image">
                        <i class="fas fa-image"></i>
                        <p>Trabajo 6</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- AOS Animation Library -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
